name: Validate Catalog

on:
  pull_request:
    paths:
      - "units/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + Terragrunt
        uses: gruntwork-io/terragrunt-action@v2
        with:
          tf_version: "1.9.0"
          tg_version: "0.78.0"

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Valida formatação HCL
        run: |
          terragrunt hclfmt --check

      - name: Lint nos units alterados
        run: |
          git diff --name-only origin/main...HEAD \
            | grep 'terragrunt.hcl' \
            | xargs -I{} dirname {} \
            | while read dir; do
                echo "→ Lint: $dir"
                tflint --chdir "$dir" || true
              done
